    <style>
        :root {
            --bg-black: #0a0a0f;
            --bg-dark: #12121a;
            --bg-panel: #1a1a2e;
            --bg-card: #16213e;
            --accent-cyan: #00d4ff;
            --accent-magenta: #ff006e;
            --accent-amber: #ffbe0b;
            --accent-green: #00f5a0;
            --accent-red: #ff3366;
            --text-primary: #e0e0e0;
            --text-dim: #8888aa;
            --text-bright: #ffffff;
            --border: #2a2a4a;
            --border-glow: rgba(0, 212, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-black);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .heading-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        /* Glow utility */
        .glow-cyan { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.05); }
        .glow-magenta { box-shadow: 0 0 10px rgba(255, 0, 110, 0.3), inset 0 0 10px rgba(255, 0, 110, 0.05); }
        .glow-amber { box-shadow: 0 0 10px rgba(255, 190, 11, 0.3), inset 0 0 10px rgba(255, 190, 11, 0.05); }
        .glow-green { box-shadow: 0 0 10px rgba(0, 245, 160, 0.3), inset 0 0 10px rgba(0, 245, 160, 0.05); }

        /* Animations */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.97; }
            92% { opacity: 1; }
            93% { opacity: 0.9; }
            94% { opacity: 1; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }
        }

        html { scroll-behavior: smooth; }

        @media (max-width: 768px) {
            select, button, input { min-height: 44px; }
        }

        @media print {
            body::after { display: none !important; }
            .no-print { display: none !important; }
            .print-full { margin: 0 !important; padding: 0 !important; max-width: 100% !important; }
            body { background: #fff !important; color: #111 !important; }
            h1, h2, h3, h4 { color: #111 !important; }
            table { border-color: #999 !important; }
            th { background: #ddd !important; color: #111 !important; }
            td { color: #111 !important; border-color: #999 !important; }
        }
    </style>

const RuleBox = ({ children, color = 'cyan' }) => {
    const borderColor = color === 'cyan' ? 'var(--accent-cyan)' : color === 'magenta' ? 'var(--accent-magenta)' : color === 'amber' ? 'var(--accent-amber)' : color === 'green' ? 'var(--accent-green)' : 'var(--accent-cyan)';
    const glowClass = `glow-${color}`;
    return (
        <div className={glowClass} style={{ border: `1px solid ${borderColor}`, borderRadius: 6, padding: '12px 16px', margin: '12px 0', background: 'var(--bg-card)' }}>
            {children}
        </div>
    );
};

const ExampleBox = ({ title, children }) => (
    <div style={{ border: '1px solid var(--accent-amber)', borderLeft: '3px solid var(--accent-amber)', borderRadius: 4, padding: '10px 14px', margin: '12px 0', background: 'rgba(255,190,11,0.05)' }}>
        <div style={{ fontFamily: 'Orbitron, sans-serif', fontSize: 10, textTransform: 'uppercase', letterSpacing: 2, color: 'var(--accent-amber)', marginBottom: 6 }}>{title || 'Example'}</div>
        <div style={{ color: 'var(--text-primary)', fontSize: 13 }}>{children}</div>
    </div>
);

const DataTable = ({ headers, rows, compact = false }) => (
    <div style={{ overflowX: 'auto', margin: '12px 0' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: compact ? 12 : 13 }}>
            <thead>
                <tr>
                    {headers.map((h, i) => (
                        <th key={i} style={{ textAlign: 'left', padding: compact ? '6px 8px' : '8px 12px', background: 'var(--bg-panel)', color: 'var(--accent-cyan)', borderBottom: '2px solid var(--accent-cyan)', fontFamily: 'Orbitron, sans-serif', fontSize: compact ? 10 : 11, textTransform: 'uppercase', letterSpacing: 1, whiteSpace: 'nowrap' }}>{h}</th>
                    ))}
                </tr>
            </thead>
            <tbody>
                {rows.map((row, ri) => (
                    <tr key={ri} style={{ background: ri % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)' }}>
                        {row.map((cell, ci) => (
                            <td key={ci} style={{ padding: compact ? '5px 8px' : '7px 12px', borderBottom: '1px solid var(--border)', color: 'var(--text-primary)' }}>{cell}</td>
                        ))}
                    </tr>
                ))}
            </tbody>
        </table>
    </div>
);

const SectionHeading = ({ id, title }) => (
    <h2 id={id} style={{ fontFamily: 'Orbitron, sans-serif', fontSize: 22, color: 'var(--accent-cyan)', marginTop: 48, marginBottom: 16, paddingBottom: 8, borderBottom: '1px solid var(--border)', scrollMarginTop: 80 }}>{title}</h2>
);

const SubHeading = ({ children }) => (
    <h3 style={{ fontFamily: 'Orbitron, sans-serif', fontSize: 15, color: 'var(--accent-magenta)', marginTop: 24, marginBottom: 10 }}>{children}</h3>
);

const Dim = ({ children }) => <span style={{ color: 'var(--text-dim)' }}>{children}</span>;
const Bright = ({ children }) => <span style={{ color: 'var(--text-bright)', fontWeight: 'bold' }}>{children}</span>;
const CyanText = ({ children }) => <span style={{ color: 'var(--accent-cyan)' }}>{children}</span>;
const Para = ({ children }) => <p style={{ marginBottom: 10, lineHeight: 1.7 }}>{children}</p>;

const OverviewSection = () => (
    <div>
        <SectionHeading id="overview" title="1. Overview" />
        <Para>
            <Bright>NULL SIGNAL</Bright> is a fast-paced cyberpunk skirmish game for 2 players (or 1 in solo/co-op mode).
            Each player controls a small warband of operatives — mercenaries, hackers, street soldiers, and specialists —
            fighting for control of objectives in a near-future urban warzone.
        </Para>
        <RuleBox color="cyan">
            <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '6px 16px', fontSize: 13 }}>
                <Bright>Scale:</Bright><span>Skirmish — 4–8 operatives per side</span>
                <Bright>Modes:</Bright><span>PvP (2-player), Solo, Co-op</span>
                <Bright>Miniatures:</Bright><span>Miniature-agnostic — use any 28mm figures</span>
                <Bright>Table:</Bright><span>3' × 3' recommended</span>
                <Bright>Rounds:</Bright><span>5–6 rounds per game</span>
                <Bright>Cost:</Bright><span>Free — all rules and tools are open</span>
            </div>
        </RuleBox>
        <Para>
            <Dim>
                The game emphasizes simultaneous firefights, quick decision-making, and narrative-driven scenarios.
                Dice pools determine outcomes: weapons set how many dice you roll, stats set which die type you use.
                Every roll of 4+ is a success.
            </Dim>
        </Para>
        <ExampleBox title="Design Philosophy">
            Null Signal is designed to be learned in one game, played in under an hour, and endlessly replayable with
            the warband builder and scenario system. No codex bloat. No pay-to-win. Just sharp tactical play.
        </ExampleBox>
    </div>
);

const CoreStatsSection = () => {
    const statDescriptions = {
        CMB: 'Offensive combat ability. Determines die type for shooting and melee attacks.',
        REF: 'Defensive reaction under fire. Determines die type when choosing Take Cover (cancel hits) instead of Returning Fire. Also governs disengaging from melee.',
        GRT: 'Toughness and willpower. Used for recovery checks and morale.',
        TEC: 'Technical skill. Used for hacking, gear actions, and scenario interactions.',
        AWR: 'Situational awareness. Used for spotting, detection, and perception checks.',
    };
    return (
        <div>
            <SectionHeading id="core-stats" title="2. Core Stats" />
            <Para>
                Every operative has <Bright>5 stats</Bright>, each assigned a die type (d6, d8, d10, or d12).
                Higher die types are better — more sides means higher chance of rolling 4+.
            </Para>
            <DataTable
                headers={['Stat', 'Full Name', 'Description']}
                rows={GAME_DATA.stats.map(s => [
                    <CyanText>{s}</CyanText>,
                    GAME_DATA.statLabels[s],
                    statDescriptions[s],
                ])}
            />
            <SubHeading>Resolution Mechanic</SubHeading>
            <RuleBox color="cyan">
                <div style={{ textAlign: 'center', fontSize: 18, fontFamily: 'Orbitron, sans-serif', color: 'var(--accent-cyan)' }}>
                    4+ on any die = SUCCESS
                </div>
            </RuleBox>
            <Para>
                Roll a pool of dice. <Bright>Each die that shows 4 or higher is one success.</Bright> The
                number of dice in the pool is determined by the weapon or action. The die type (d6, d8, d10, d12)
                is determined by the relevant stat.
            </Para>
            <SubHeading>Die Probabilities</SubHeading>
            <DataTable
                headers={['Die', 'Chance of 4+', 'Successes per 3 dice (avg)']}
                rows={[
                    ['d6', '50%', '1.5'],
                    ['d8', '62.5%', '1.88'],
                    ['d10', '70%', '2.10'],
                    ['d12', '75%', '2.25'],
                ]}
            />
            <SubHeading>Dice Pool Rules</SubHeading>
            <Para>
                <Bright>Weapon determines pool size</Bright> (number of attack dice).{' '}
                <Bright>Stat determines die type</Bright> (which die you roll for each). Default stat checks
                that aren't tied to a weapon use <Bright>2 dice</Bright>.
            </Para>
            <ExampleBox>
                An operative with CMB d8 fires a Rifle (3 attack dice). They roll 3d8, counting each die showing 4+ as a hit.
            </ExampleBox>
        </div>
    );
};

        <div style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '16px 0', flexWrap: 'wrap' }}>
            {GAME_DATA.healthTrack.map((step, i) => {
                const isDie = step.startsWith('d');
                const bg = isDie ? 'var(--bg-card)' : step === 'DOWN' ? 'rgba(255,190,11,0.2)' : 'rgba(255,51,102,0.2)';
                const border = isDie ? 'var(--accent-cyan)' : step === 'DOWN' ? 'var(--accent-amber)' : 'var(--accent-red)';
                const color = isDie ? 'var(--accent-cyan)' : step === 'DOWN' ? 'var(--accent-amber)' : 'var(--accent-red)';
                return (
                    <React.Fragment key={i}>
                        {i > 0 && <span style={{ color: 'var(--text-dim)', fontSize: 18 }}>→</span>}
                        <span style={{ display: 'inline-block', padding: '8px 16px', border: `2px solid ${border}`, borderRadius: 6, background: bg, color, fontFamily: 'Orbitron, sans-serif', fontSize: 16, fontWeight: 'bold' }}>{step}</span>
                    </React.Fragment>
                );
            })}
        </div>
        <SubHeading>Taking Hits</SubHeading>
        <RuleBox color="magenta">
            <Para>When an operative takes a hit, roll their <Bright>current health die</Bright>.</Para>
            <ul style={{ paddingLeft: 20, lineHeight: 2 }}>
                <li><Bright>4+ =</Bright> Stay up. Health die <CyanText>degrades one step</CyanText> (e.g., d10 → d8).</li>
                <li><Bright>1–3 =</Bright> Fail. Operative goes <span style={{ color: 'var(--accent-amber)' }}>DOWN</span>.</li>
                <li>A <span style={{ color: 'var(--accent-amber)' }}>DOWN</span> operative hit again goes <span style={{ color: 'var(--accent-red)' }}>OUT</span> (eliminated).</li>
            </ul>
        </RuleBox>
        <SubHeading>d6 Floor Rule</SubHeading>
        <Para>
            Health dice cannot degrade below <Bright>d6</Bright>. An operative at d6 who passes a health check
            remains at d6. They are at their most vulnerable but still fighting.
        </Para>
        <SubHeading>Starting Health by Tier</SubHeading>
        <DataTable
            headers={['Tier', 'Starting Health', 'Steps Before DOWN']}
            rows={GAME_DATA.tiers.map(t => [
                <Bright>{t.name}</Bright>,
                <CyanText>{t.health}</CyanText>,
                t.health === 'd10' ? '3 (d10 → d8 → d6 → DOWN)' : t.health === 'd8' ? '2 (d8 → d6 → DOWN)' : '1 (d6 → DOWN)',
            ])}
        />
        <SubHeading>Recovery</SubHeading>
        <Para>
            During the <Bright>End Phase</Bright>, a DOWN operative may attempt recovery: roll their
            current health die (the last die before going DOWN). On <Bright>4+ they recover</Bright> to
            DOWN → d6. On failure, they remain DOWN.
        </Para>
        <SubHeading>Simultaneous Resolution</SubHeading>
        <Para>
            <Dim>Stats never degrade — only the health die changes. When both sides deal hits (Return Fire in firefights,
            or brawls), resolve simultaneously — both combatants roll before either applies results.</Dim>
        </Para>
    </div>
);

const CombatSection = () => (
    <div>
        <SectionHeading id="combat" title="4. Combat" />

        <SubHeading>Line of Sight (LOS)</SubHeading>
        <RuleBox color="cyan">
            <div style={{ textAlign: 'center', fontSize: 14, fontWeight: 'bold', marginBottom: 10, color: 'var(--accent-cyan)' }}>
                If you can see it, you can shoot it. Terrain blocks, operatives don't.
            </div>
        </RuleBox>
        <Para>An operative can see a target if you can draw an unobstructed straight line from any part of the operative's base to any part of the target's base.</Para>
        <RuleBox color="green">
            <ul style={{ paddingLeft: 20, lineHeight: 2.2 }}>
                <li>Terrain features (walls, buildings, large containers) <Bright>block LOS entirely</Bright> if the line passes through them.</li>
                <li>Other operatives (friendly or enemy) do <Bright>NOT</Bright> block LOS — you can shoot past them.</li>
                <li>If in doubt, get down to model-eye-level and check. If you can see any part of the target, you have LOS.</li>
                <li><CyanText>Partial LOS</CyanText> = the target is partially obscured by terrain. This counts as <Bright>Cover</Bright> (attacker's CMB shifts down one step).</li>
            </ul>
        </RuleBox>

        <SubHeading>Firefights (Ranged Combat)</SubHeading>
        <Para>When an operative shoots, the defender must make a <Bright>tactical choice</Bright>: trade fire or dive for cover.</Para>
        <RuleBox color="cyan">
            <ol style={{ paddingLeft: 20, lineHeight: 2 }}>
                <li><Bright>Attacker</Bright> declares Shoot and rolls CMB pool (weapon's attack dice at their CMB die type). Each 4+ = a hit.</li>
                <li><Bright>Defender chooses one response:</Bright></li>
            </ol>
            <div style={{ paddingLeft: 40, marginTop: 4, marginBottom: 8 }}>
                <div style={{ marginBottom: 8 }}>
                    <Bright>A) Return Fire (CMB):</Bright> Roll their weapon's attack dice at their CMB die type.
                    Both sides' successes (4+) count as hits. Resolve hits against <CyanText>BOTH operatives simultaneously</CyanText>.
                </div>
                <div>
                    <Bright>B) Take Cover (REF):</Bright> Roll 2 dice at their REF die type.
                    Each success (4+) <CyanText>cancels one incoming hit</CyanText>. The defender does NOT fire back.
                </div>
            </div>
            <ol start={3} style={{ paddingLeft: 20, lineHeight: 2 }}>
                <li>Remaining uncancelled hits trigger health checks on the target.</li>
                <li>If the defender chose Return Fire, the attacker also takes health checks for uncancelled hits.</li>
            </ol>
        </RuleBox>
        <ExampleBox title="Return Fire Example">
            Alpha (CMB d8, Rifle 3AD) shoots Beta (CMB d6, SMG 3AD). Alpha rolls 3d8 → 2 hits.
            Beta chooses Return Fire and rolls 3d6 → 1 hit.
            Both sides' hits apply simultaneously: Beta takes 2 health checks, Alpha takes 1 health check.
        </ExampleBox>
        <ExampleBox title="Take Cover Example">
            Alpha (CMB d8, Rifle 3AD) shoots Gamma (REF d8). Alpha rolls 3d8 → 2 hits.
            Gamma chooses Take Cover and rolls 2d8 → 1 success, cancelling 1 hit.
            Gamma takes 1 health check. Alpha takes no damage (Gamma didn't fire back).
        </ExampleBox>
        <RuleBox color="amber">
            <Bright>The choice matters:</Bright> A well-armed operative may prefer to Return Fire and trade blows.
            A fragile operative (low CMB or low health) may prefer Take Cover to survive. This creates a
            meaningful tactical decision on every firefight.
        </RuleBox>

        <SubHeading>Range Rules</SubHeading>
        <DataTable
            headers={['Zone', 'Effect']}
            rows={[
                [<Bright>Line of Sight (LOS)</Bright>, 'If you can see them, you can shoot. Required for all ranged attacks.'],
                [<Bright>Within Range Band</Bright>, 'No penalty. Roll full attack dice at full CMB die type.'],
                [<Bright>Beyond Range Band</Bright>, 'Shift CMB die type down 1 step (e.g., d8 → d6). Still roll full attack dice count.'],
                [<Bright>Beyond Hard Cap</Bright>, 'Cannot shoot. Target is out of range entirely.'],
            ]}
        />

        <SubHeading>Combat Modifiers</SubHeading>
        <DataTable
            headers={['Modifier', 'Effect']}
            rows={[
                [<Bright>Cover</Bright>, 'Target in cover: shift attacker\'s CMB die down 1 step.'],
                [<Bright>Engaged in Melee</Bright>, 'Cannot shoot while in base contact with an enemy (must Fight instead).'],
                [<Bright>Both Modifiers</Bright>, 'Penalties stack. Beyond range band + cover = shift down 2 steps.'],
            ]}
        />

        <SubHeading>Brawls (Melee Combat)</SubHeading>
        <RuleBox color="magenta">
            <Para>Both combatants roll CMB simultaneously. <Bright>No Take Cover option in melee</Bright> — both fighters are committed.</Para>
            <ul style={{ paddingLeft: 20, lineHeight: 2 }}>
                <li><Bright>Unarmed:</Bright> 1 attack die (default for all operatives in melee).</li>
                <li><Bright>Melee Weapon:</Bright> Use the weapon's attack dice instead.</li>
                <li>All hits from both sides are applied simultaneously.</li>
            </ul>
        </RuleBox>

        <SubHeading>Engagement & Disengagement</SubHeading>
        <RuleBox color="magenta">
            <Para><Bright>Engagement:</Bright> An operative in base contact with an enemy is <CyanText>engaged</CyanText>. Engaged operatives cannot Shoot or move away — they must Fight, Use Gear, or Interact on their activation.</Para>
            <Para><Bright>Disengagement:</Bright> An engaged operative may attempt to disengage instead of fighting. Roll <CyanText>2 REF dice</CyanText> — on 1+ success, the operative breaks free and may move up to <Bright>3"</Bright> away (not their full movement). On failure, the operative stays engaged and loses their action for this activation.</Para>
            <Para><Dim>The enemy does NOT get a free attack when you attempt to disengage.</Dim></Para>
        </RuleBox>

        <SubHeading>Opposed Checks</SubHeading>
        <Para>
            Some situations call for an opposed check: both sides roll 2 dice of the relevant stat. The side
            with more successes wins. Ties go to the defender/status quo.
        </Para>
    </div>
);

const TerrainSection = () => (

                title={sidebarOpen ? 'Close menu' : 'Open menu'}
            >
                {sidebarOpen ? '\u2715' : '\u2630'}
            </button>
            <div>
                <span style={{ fontFamily: 'Orbitron, sans-serif', fontSize: 20, fontWeight: 900, color: 'var(--accent-cyan)', letterSpacing: 2 }}>NULL SIGNAL</span>
                <span style={{ fontFamily: 'Orbitron, sans-serif', fontSize: 14, fontWeight: 400, color: 'var(--accent-magenta)', marginLeft: 10, letterSpacing: 3 }}>RULES</span>
            </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <a href="NullSignal_Forge.html" style={{
                color: 'var(--text-dim)', textDecoration: 'none', fontSize: 11,
                fontFamily: 'Share Tech Mono, monospace', padding: '6px 12px',
                border: '1px solid var(--border)', borderRadius: 4,
                transition: 'all 0.15s',
            }}
            onMouseEnter={e => { e.target.style.color = 'var(--accent-cyan)'; e.target.style.borderColor = 'var(--accent-cyan)'; }}
            onMouseLeave={e => { e.target.style.color = 'var(--text-dim)'; e.target.style.borderColor = 'var(--border)'; }}
            >FORGE</a>
            <a href="NullSignal_SoloEngine.html" style={{
                color: 'var(--text-dim)', textDecoration: 'none', fontSize: 11,
                fontFamily: 'Share Tech Mono, monospace', padding: '6px 12px',
                border: '1px solid var(--border)', borderRadius: 4,
                transition: 'all 0.15s',
            }}
            onMouseEnter={e => { e.target.style.color = 'var(--accent-green)'; e.target.style.borderColor = 'var(--accent-green)'; }}
            onMouseLeave={e => { e.target.style.color = 'var(--text-dim)'; e.target.style.borderColor = 'var(--border)'; }}
            >SOLO ENGINE</a>
            <button onClick={() => window.print()} style={{
                background: 'none', border: '1px solid var(--border)',
                color: 'var(--text-dim)', padding: '6px 12px', borderRadius: 4,
                cursor: 'pointer', fontSize: 11, fontFamily: 'Share Tech Mono, monospace',
                transition: 'all 0.15s',
            }}
            onMouseEnter={e => { e.target.style.color = 'var(--accent-amber)'; e.target.style.borderColor = 'var(--accent-amber)'; }}
            onMouseLeave={e => { e.target.style.color = 'var(--text-dim)'; e.target.style.borderColor = 'var(--border)'; }}
            >PRINT</button>

);

// ============================================================
// MAIN APP
// ============================================================
const App = () => {
    const [sidebarOpen, setSidebarOpen] = React.useState(window.innerWidth >= 1024);
    const [searchTerm, setSearchTerm] = React.useState('');
    const [activeSection, setActiveSection] = React.useState('overview');

    // Handle resize
    React.useEffect(() => {
        const onResize = () => {
            if (window.innerWidth >= 1024) setSidebarOpen(true);
        };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
    }, []);

    // Intersection Observer for active section tracking
    React.useEffect(() => {
        const observer = new IntersectionObserver(
            (entries) => {
                const visible = entries
                    .filter(e => e.isIntersecting)
                    .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
                if (visible.length > 0) {
                    setActiveSection(visible[0].target.id);
                }
            },
            { rootMargin: '-80px 0px -60% 0px', threshold: 0 }
        );
        SECTIONS.forEach(s => {
            const el = document.getElementById(s.id);
            if (el) observer.observe(el);
        });
        return () => observer.disconnect();
    }, []);

    const handleNavClick = (id) => {
        const el = document.getElementById(id);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth' });
            setActiveSection(id);
        }
        if (window.innerWidth < 1024) setSidebarOpen(false);
    };

    const sidebarWidth = sidebarOpen && window.innerWidth >= 1024 ? 256 : 0;

    return (
        <div>
            <Header onMenuToggle={() => setSidebarOpen(p => !p)} sidebarOpen={sidebarOpen} />
            <Sidebar
                activeSection={activeSection}
                searchTerm={searchTerm}
                onSearchChange={setSearchTerm}
                onNavClick={handleNavClick}
                isOpen={sidebarOpen}
                onClose={() => setSidebarOpen(false)}
            />
            <main className="print-full" style={{
                marginLeft: sidebarWidth,
                paddingTop: 80, paddingBottom: 80,
                paddingLeft: 32, paddingRight: 32,
                maxWidth: sidebarWidth + 900,
                transition: 'margin-left 0.2s ease',
            }}>
                <OverviewSection />
                <CoreStatsSection />
                <HealthSystemSection />
                <CombatSection />
                <TerrainSection />
                <TurnStructureSection />
                <WarbandBuildingSection />
                <WeaponsSection />
                <GearSection />
                <AbilitiesSection />
                <SoloAISection />
                <AIProfilesSection />
                <ScenariosSection />
                <QuickReferenceSection />
                <div style={{ marginTop: 64, padding: '24px 0', borderTop: '1px solid var(--border)', textAlign: 'center' }}>
                    <span style={{ color: 'var(--text-dim)', fontSize: 11 }}>NULL SIGNAL — Free cyberpunk skirmish game — All rules, tools, and army builder at your fingertips.</span>
                </div>
            </main>
        </div>
    );
};

// ============================================================
// RENDER
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
