    <meta charset="UTF-8" />

    <title>NULL SIGNAL — Solo Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-black: #0a0a0f;
            --bg-dark: #12121a;
            --bg-panel: #1a1a2e;
            --bg-card: #16213e;
            --accent-cyan: #00d4ff;
            --accent-magenta: #ff006e;
            --accent-amber: #ffbe0b;
            --accent-green: #00f5a0;
            --accent-red: #ff3366;
            --text-primary: #e0e0e0;
            --text-dim: #8888aa;
            --text-bright: #ffffff;
            --border: #2a2a4a;
            --border-glow: rgba(0, 212, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-black);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, .heading-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        /* Glow utility */
        .glow-cyan { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.05); }
        .glow-magenta { box-shadow: 0 0 10px rgba(255, 0, 110, 0.3), inset 0 0 10px rgba(255, 0, 110, 0.05); }
        .glow-amber { box-shadow: 0 0 10px rgba(255, 190, 11, 0.3), inset 0 0 10px rgba(255, 190, 11, 0.05); }
        .glow-green { box-shadow: 0 0 10px rgba(0, 245, 160, 0.3), inset 0 0 10px rgba(0, 245, 160, 0.05); }

        input[type="text"], select {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Dice animation */
        @keyframes diceRoll {
            0%, 100% { transform: rotateX(0deg); }
            25% { transform: rotateX(90deg); }
            50% { transform: rotateX(180deg); }
            75% { transform: rotateX(270deg); }
        }

        @keyframes diceSpin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .dice-rolling {
            animation: diceSpin 0.15s linear infinite;
        }

        .dice-settled {
            animation: none;
            transition: transform 0.2s ease-out;
        }

        /* Animations */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.97; }
            92% { opacity: 1; }
            93% { opacity: 0.9; }
            94% { opacity: 1; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }

        @media (max-width: 768px) {
            select, button, input { min-height: 44px; }
        }
    </style>
</head>

const { useState, useEffect, useRef, useCallback, useMemo } = React;

function rollD6() {
    return Math.floor(Math.random() * 6) + 1;
}

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

const TIER_MAP = {};
GAME_DATA.tiers.forEach(t => TIER_MAP[t.id] = t);

const BEHAVIOR_MAP = {};
GAME_DATA.behaviorTags.forEach(b => BEHAVIOR_MAP[b.id] = b);

const TAG_COLORS = {
    aggressive: { bg: 'rgba(255, 51, 102, 0.2)', border: '#ff3366', text: '#ff3366' },
    defensive: { bg: 'rgba(0, 212, 255, 0.2)', border: '#00d4ff', text: '#00d4ff' },
    cautious: { bg: 'rgba(255, 190, 11, 0.2)', border: '#ffbe0b', text: '#ffbe0b' },
    flanker: { bg: 'rgba(255, 0, 110, 0.2)', border: '#ff006e', text: '#ff006e' },
};

const HEALTH_COLORS = {
    d10: '#00f5a0',
    d8: '#4ade80',
    d6: '#ffbe0b',
    DOWN: '#ff3366',
    OUT: '#661429',
};

const HEALTH_TRACK = ['d10', 'd8', 'd6', 'DOWN', 'OUT'];

function getNextHealth(current) {
    const idx = HEALTH_TRACK.indexOf(current);
    if (idx < HEALTH_TRACK.length - 1) return HEALTH_TRACK[idx + 1];
    return current;
}

function getBehaviorTagFromRoll(roll) {
    if (roll <= 2) return 'aggressive';
    if (roll <= 4) return 'defensive';
    if (roll === 5) return 'cautious';
    return 'flanker';
}

function getActionFromRoll(behaviorId, roll) {
    const behavior = BEHAVIOR_MAP[behaviorId];
    if (!behavior) return '';
    if (roll <= 2) return behavior.table[0];
    if (roll <= 4) return behavior.table[1];
    return behavior.table[2];
}

function calcWarbandCost(operatives) {
    return operatives.reduce((sum, op) => sum + (TIER_MAP[op.tier]?.cost || 0), 0);
}

// ============================================================
// PERSISTENCE
// ============================================================
const STORAGE_KEYS = {
    warband: 'nullSignal_aiWarband',
    game: 'nullSignal_soloGameState',
};

function saveWarband(warband) {
    try { localStorage.setItem(STORAGE_KEYS.warband, JSON.stringify(warband)); } catch(e) {}
}

function loadWarband() {
    try {
        const d = localStorage.getItem(STORAGE_KEYS.warband);
        return d ? JSON.parse(d) : null;
    } catch(e) { return null; }
}

function saveGameState(state) {
    try { localStorage.setItem(STORAGE_KEYS.game, JSON.stringify(state)); } catch(e) {}
}

function loadGameState() {
    try {
        const d = localStorage.getItem(STORAGE_KEYS.game);
        return d ? JSON.parse(d) : null;
    } catch(e) { return null; }
}

function clearGameState() {
    try { localStorage.removeItem(STORAGE_KEYS.game); } catch(e) {}
}

// --- Tier Badge ---
function TierBadge({ tierId }) {
    const tier = TIER_MAP[tierId];
    if (!tier) return null;
    const colors = {
        leader: 'var(--accent-amber)',
        specialist: 'var(--accent-cyan)',
        operative: 'var(--accent-green)',
        recruit: 'var(--text-dim)',
    };
    const c = colors[tierId] || 'var(--text-dim)';
    return (
        <span className="text-xs font-bold px-1.5 py-0.5 rounded"
            style={{ background: `${c}22`, color: c, border: `1px solid ${c}44` }}>
            {tier.name}
        </span>
    );
}

// --- Behavior Tag Badge ---
function TagBadge({ tagId }) {
    const tc = TAG_COLORS[tagId];
    const tag = BEHAVIOR_MAP[tagId];
    if (!tc || !tag) return null;
    return (
        <span className="text-xs font-bold px-1.5 py-0.5 rounded"
            style={{ background: tc.bg, color: tc.text, border: `1px solid ${tc.border}44` }}>
            {tag.name}
        </span>
    );
}

// --- Health Badge ---
function HealthBadge({ health, onClick }) {
    const c = HEALTH_COLORS[health] || '#888';
    const isDown = health === 'DOWN';
    const isOut = health === 'OUT';
    return (
        <button onClick={onClick}
            className="text-xs font-bold px-2 py-1 rounded cursor-pointer transition-all hover:scale-110"
            title="Click to degrade health"
            style={{
                background: `${c}22`,
                color: c,
                border: `1px solid ${c}66`,
                textDecoration: isOut ? 'line-through' : 'none',
                opacity: isOut ? 0.5 : 1,
            }}>
            {health}
        </button>
    );
}

// --- Dice Roller Visual ---
function DiceRollerVisual({ rolling, result, onRoll, label }) {
    const [displayNum, setDisplayNum] = useState(1);
    const intervalRef = useRef(null);

    useEffect(() => {
        if (rolling) {
            let count = 0;
            const maxTicks = 16;
            const tick = () => {
                count++;
                setDisplayNum(rollD6());
                if (count >= maxTicks) {
                    clearInterval(intervalRef.current);
                    // Final result is set by parent
                }
            };
            intervalRef.current = setInterval(tick, 50);
            return () => clearInterval(intervalRef.current);
        }
    }, [rolling]);

    useEffect(() => {
        if (result !== null && !rolling) {
            setDisplayNum(result);
        }
    }, [result, rolling]);

    return (
        <div className="flex flex-col items-center gap-3">
            {label && <div className="text-xs uppercase tracking-widest" style={{ color: 'var(--text-dim)' }}>{label}</div>}
            <div className={`w-20 h-20 sm:w-24 sm:h-24 flex items-center justify-center rounded-lg text-3xl sm:text-4xl font-black ${rolling ? 'dice-rolling' : 'dice-settled'}`}
                style={{
                    background: rolling ? 'rgba(0,212,255,0.15)' : (result !== null ? 'rgba(0,245,160,0.15)' : 'var(--bg-card)'),
                    border: `2px solid ${rolling ? 'var(--accent-cyan)' : (result !== null ? 'var(--accent-green)' : 'var(--border)')}`,
                    color: rolling ? 'var(--accent-cyan)' : (result !== null ? 'var(--accent-green)' : 'var(--text-dim)'),
                    fontFamily: "'Orbitron', sans-serif",
                }}>
                {result !== null || rolling ? displayNum : '?'}
            </div>
            {onRoll && (
                <button onClick={onRoll} disabled={rolling}
                    className="heading-font text-sm font-bold px-6 py-2 rounded transition-all hover:scale-105 disabled:opacity-50"
                    style={{
                        background: 'linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta))',
                        color: '#fff',
                        border: 'none',
                        cursor: rolling ? 'not-allowed' : 'pointer',
                    }}>
                    {rolling ? 'ROLLING...' : 'ROLL D6'}
                </button>
            )}
        </div>
    );
}


// ============================================================
// SETUP VIEW
// ============================================================
function SetupView({ onStartGame, initialWarband }) {
    const [operatives, setOperatives] = useState(initialWarband || []);
    const [selectedScenario, setSelectedScenario] = useState(GAME_DATA.scenarios[0].id);
    const [budget] = useState(10);

    // Save warband on change
    useEffect(() => {
        saveWarband(operatives);
    }, [operatives]);

    const cost = calcWarbandCost(operatives);
    const remaining = budget - cost;
    const scenario = GAME_DATA.scenarios.find(s => s.id === selectedScenario);

    function addOperative(tierId) {
        const tier = TIER_MAP[tierId];
        if (!tier) return;
        if (tierId === 'leader' && operatives.some(o => o.tier === 'leader')) return;
        if (remaining < tier.cost && tierId !== 'leader') return;
        setOperatives(prev => [...prev, {
            id: generateId(),
            name: '',
            tier: tierId,
            behaviorTag: 'aggressive',
        }]);
    }

    function removeOperative(id) {
        setOperatives(prev => prev.filter(o => o.id !== id));
    }

    function updateOperative(id, field, value) {
        setOperatives(prev => prev.map(o => o.id === id ? { ...o, [field]: value } : o));
    }

    function autoAssignTags() {
        setOperatives(prev => prev.map(o => ({
            ...o,
            behaviorTag: getBehaviorTagFromRoll(rollD6()),
        })));
    }

    function randomizeWarband() {
        const ops = [];
        // Always add a leader
        ops.push({ id: generateId(), name: 'AI Leader', tier: 'leader', behaviorTag: getBehaviorTagFromRoll(rollD6()) });
        let remaining = budget; // leader costs 0
        // Fill with random mix
        const fillTiers = ['specialist', 'operative', 'recruit'];
        let safety = 0;
        while (remaining > 0 && safety < 20) {
            safety++;
            const available = fillTiers.filter(t => TIER_MAP[t].cost <= remaining);
            if (available.length === 0) break;
            const pick = available[Math.floor(Math.random() * available.length)];
            const tier = TIER_MAP[pick];
            const names = {
                specialist: ['AI Specialist', 'AI Tech', 'AI Gunner', 'AI Hacker', 'AI Medic'],
                operative: ['AI Operative', 'AI Soldier', 'AI Agent', 'AI Enforcer'],
                recruit: ['AI Recruit', 'AI Grunt', 'AI Rookie', 'AI Conscript'],
            };
            const namePool = names[pick];
            ops.push({
                id: generateId(),
                name: namePool[Math.floor(Math.random() * namePool.length)] + ' ' + (ops.length),
                tier: pick,
                behaviorTag: getBehaviorTagFromRoll(rollD6()),
            });
            remaining -= tier.cost;
        }
        setOperatives(ops);
    }

    const canStart = operatives.length > 0 && operatives.some(o => o.tier === 'leader');

    return (
        <div className="max-w-4xl mx-auto p-4 space-y-6">
            {/* Scenario Selector */}
            <section className="rounded-lg p-4" style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)' }}>
                <h2 className="text-lg font-bold mb-3 tracking-wider" style={{ color: 'var(--accent-cyan)' }}>
                    SCENARIO
                </h2>
                <select value={selectedScenario} onChange={e => setSelectedScenario(e.target.value)}
                    className="w-full p-2 rounded text-sm"
                    style={{ background: 'var(--bg-card)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}>
                    {GAME_DATA.scenarios.map(s => (
                        <option key={s.id} value={s.id}>{s.name}</option>
                    ))}
                </select>
                {scenario && (
                    <div className="mt-3 p-3 rounded text-sm space-y-2" style={{ background: 'var(--bg-card)', border: '1px solid var(--border)' }}>
                        <p style={{ color: 'var(--text-dim)' }}>{scenario.briefing}</p>
                        <div className="flex gap-4 text-xs">
                            <span style={{ color: 'var(--accent-amber)' }}>Rounds: {scenario.rounds}</span>
                            <span style={{ color: 'var(--text-dim)' }}>Table: {scenario.tableSize}</span>
                        </div>
                        {scenario.deployment && (
                            <div className="pt-2" style={{ borderTop: '1px solid var(--border)' }}>
                                <div className="text-xs font-bold mb-1 tracking-wider" style={{ color: 'var(--accent-magenta)', fontFamily: 'Orbitron, sans-serif', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em' }}>Deployment</div>
                                <p className="text-xs" style={{ color: 'var(--text-dim)', lineHeight: 1.5 }}>{scenario.deployment}</p>
                            </div>
                        )}
                        {scenario.objectives && (
                            <div>
                                <div className="text-xs font-bold mb-1 tracking-wider" style={{ color: 'var(--accent-magenta)', fontFamily: 'Orbitron, sans-serif', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em' }}>Objectives</div>
                                <p className="text-xs" style={{ color: 'var(--text-dim)', lineHeight: 1.5 }}>{scenario.objectives}</p>
                            </div>
                        )}
                        {scenario.specialRules && scenario.specialRules.length > 0 && (
                            <div className="pt-2" style={{ borderTop: '1px solid var(--border)' }}>
                                <div className="text-xs font-bold mb-1 tracking-wider" style={{ color: 'var(--accent-green)', fontFamily: 'Orbitron, sans-serif', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em' }}>Special Rules</div>
                                <ul className="text-xs space-y-1" style={{ paddingLeft: 16, color: 'var(--text-primary)', lineHeight: 1.5 }}>
                                    {scenario.specialRules.map((r, i) => <li key={i}>{r}</li>)}
                                </ul>
                            </div>
                        )}
                        {scenario.vpConditions && scenario.vpConditions.length > 0 && (
                            <div className="pt-2" style={{ borderTop: '1px solid var(--border)' }}>
                                <div className="text-xs font-bold mb-1 tracking-wider" style={{ color: 'var(--accent-amber)', fontFamily: 'Orbitron, sans-serif', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em' }}>VP Conditions</div>
                                <ul className="text-xs space-y-1" style={{ paddingLeft: 16, color: 'var(--accent-amber)', lineHeight: 1.5 }}>
                                    {scenario.vpConditions.map((v, i) => <li key={i}>{v}</li>)}
                                </ul>
                            </div>
                        )}
                    </div>
                )}
            </section>

            {/* AI Warband Builder */}
            <section className="rounded-lg p-4" style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)' }}>
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-4">
                    <h2 className="text-lg font-bold tracking-wider" style={{ color: 'var(--accent-magenta)' }}>
                        AI WARBAND
                    </h2>
                    <div className="flex items-center gap-2 text-sm">
                        <span style={{ color: 'var(--text-dim)' }}>Budget:</span>
                        <span className="font-bold" style={{ color: remaining >= 0 ? 'var(--accent-green)' : 'var(--accent-red)' }}>
                            {cost} / {budget}
                        </span>
                        <span className="text-xs px-1.5 py-0.5 rounded"
                            style={{ background: remaining >= 0 ? 'rgba(0,245,160,0.15)' : 'rgba(255,51,102,0.15)', color: remaining >= 0 ? 'var(--accent-green)' : 'var(--accent-red)' }}>
                            {remaining >= 0 ? `${remaining} remaining` : 'Over budget!'}
                        </span>
                    </div>
                </div>

                {/* Add Operative Buttons */}
                <div className="flex flex-wrap gap-2 mb-4">
                    {GAME_DATA.tiers.map(tier => {
                        const disabled = (tier.id === 'leader' && operatives.some(o => o.tier === 'leader'))
                            || (tier.id !== 'leader' && remaining < tier.cost);
                        return (
                            <button key={tier.id} onClick={() => addOperative(tier.id)} disabled={disabled}
                                className="text-xs font-bold px-3 py-1.5 rounded transition-all hover:scale-105 disabled:opacity-30 disabled:cursor-not-allowed"
                                style={{ background: 'var(--bg-card)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}>
                                + {tier.name} ({tier.cost}pt)
                            </button>
                        );
                    })}
                </div>

                {/* Operative List */}
                <div className="space-y-2 mb-4">
                    {operatives.length === 0 && (
                        <div className="text-center py-8 text-sm" style={{ color: 'var(--text-dim)' }}>
                            No operatives added. Add a Leader to begin.
                        </div>
                    )}
                    {operatives.map(op => (
                        <div key={op.id} className="flex flex-col sm:flex-row sm:items-center gap-2 p-3 rounded"
                            style={{ background: 'var(--bg-card)', border: '1px solid var(--border)' }}>
                            <div className="flex items-center gap-2 flex-1">
                                <input type="text" value={op.name} onChange={e => updateOperative(op.id, 'name', e.target.value)}
                                    placeholder={`${TIER_MAP[op.tier]?.name || 'Operative'} name...`}
                                    className="flex-1 px-2 py-1 rounded text-sm bg-transparent"
                                    style={{ border: '1px solid var(--border)', color: 'var(--text-primary)' }} />
                                <TierBadge tierId={op.tier} />
                            </div>
                            <div className="flex items-center gap-2">
                                <select value={op.behaviorTag} onChange={e => updateOperative(op.id, 'behaviorTag', e.target.value)}
                                    className="text-xs px-2 py-1 rounded"
                                    style={{ background: 'var(--bg-panel)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}>
                                    {GAME_DATA.behaviorTags.map(bt => (
                                        <option key={bt.id} value={bt.id}>{bt.name}</option>
                                    ))}
                                </select>
                                <TagBadge tagId={op.behaviorTag} />
                                <button onClick={() => removeOperative(op.id)}
                                    className="text-xs px-2 py-1 rounded hover:scale-110 transition-all"
                                    style={{ color: 'var(--accent-red)', border: '1px solid var(--accent-red)33' }}>
                                    X
                                </button>
                            </div>
                        </div>
                    ))}
                </div>

                {/* Action Buttons */}
                <div className="flex flex-wrap gap-2">
                    <button onClick={autoAssignTags} disabled={operatives.length === 0}
                        className="text-xs font-bold px-4 py-2 rounded transition-all hover:scale-105 disabled:opacity-30"
                        style={{ background: 'rgba(255,190,11,0.15)', color: 'var(--accent-amber)', border: '1px solid var(--accent-amber)44' }}>
                        Auto-assign Tags
                    </button>
                    <button onClick={randomizeWarband}
                        className="text-xs font-bold px-4 py-2 rounded transition-all hover:scale-105"
                        style={{ background: 'rgba(255,0,110,0.15)', color: 'var(--accent-magenta)', border: '1px solid var(--accent-magenta)44' }}>
                        Randomize Warband
                    </button>
                </div>
            </section>

            {/* Start Button */}
            <button onClick={() => canStart && onStartGame(operatives, selectedScenario)} disabled={!canStart}
                className="heading-font w-full text-lg font-bold py-4 rounded-lg transition-all hover:scale-[1.01] disabled:opacity-30 disabled:cursor-not-allowed"
                style={{
                    background: canStart ? 'linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta))' : 'var(--bg-panel)',
                    color: '#fff',
                    border: 'none',
                    cursor: canStart ? 'pointer' : 'not-allowed',
                }}>
                START GAME
            </button>
        </div>
    );
}

// PLAY VIEW

function PlayView({ initialState, onNewGame }) {
    const [gameState, setGameState] = useState(initialState);
    const [activeOpId, setActiveOpId] = useState(null);
    const [rolling, setRolling] = useState(false);
    const [rollResult, setRollResult] = useState(null);
    const [showEndPhase, setShowEndPhase] = useState(false);
    const [endPhaseChecks, setEndPhaseChecks] = useState({ recovery: false, vp: false, conditions: false, advance: false });
    const [targetPriorityOpen, setTargetPriorityOpen] = useState(false);
    const [recoveryRolling, setRecoveryRolling] = useState(null);
    const [recoveryResult, setRecoveryResult] = useState(null);

    // Persist game state
    useEffect(() => {
        saveGameState(gameState);
    }, [gameState]);

    const scenario = GAME_DATA.scenarios.find(s => s.id === gameState.scenarioId);
    const totalRounds = scenario?.rounds || 6;

    const activeOp = gameState.operatives.find(o => o.id === activeOpId);
    const activeBehavior = activeOp ? BEHAVIOR_MAP[activeOp.behaviorTag] : null;

    const allActivated = gameState.operatives
        .filter(o => o.health !== 'OUT' && o.health !== 'DOWN')
        .every(o => gameState.activatedThisRound.includes(o.id));

    function updateOp(id, updates) {
        setGameState(prev => ({
            ...prev,
            operatives: prev.operatives.map(o => o.id === id ? { ...o, ...updates } : o),
        }));
    }

    function degradeHealth(id) {
        const op = gameState.operatives.find(o => o.id === id);
        if (!op) return;
        const next = getNextHealth(op.health);
        updateOp(id, { health: next });
    }

    function selectOperative(id) {
        const op = gameState.operatives.find(o => o.id === id);
        if (!op || op.health === 'OUT') return;
        setActiveOpId(id);
        setRollResult(null);
    }

    function performRoll() {
        if (rolling || !activeOp) return;
        setRolling(true);
        setRollResult(null);

        setTimeout(() => {
            const result = rollD6();
            setRollResult(result);
            setRolling(false);
        }, 850);
    }

    function markActivated() {
        if (!activeOpId) return;
        setGameState(prev => ({
            ...prev,
            activatedThisRound: [...prev.activatedThisRound, activeOpId],
        }));
        setActiveOpId(null);
        setRollResult(null);
    }

    function nextRound() {
        setGameState(prev => ({
            ...prev,
            currentRound: Math.min(prev.currentRound + 1, totalRounds),
            activatedThisRound: [],
        }));
        setShowEndPhase(false);
        setEndPhaseChecks({ recovery: false, vp: false, conditions: false, advance: false });
        setActiveOpId(null);
        setRollResult(null);
    }

    function openEndPhase() {
        setShowEndPhase(true);
        setActiveOpId(null);
        setRollResult(null);
    }

    function performRecovery(opId) {
        if (recoveryRolling) return;
        setRecoveryRolling(opId);
        setRecoveryResult(null);
        setTimeout(() => {
            const result = rollD6();
            setRecoveryResult({ opId, roll: result, success: result >= 4 });
            if (result >= 4) {
                updateOp(opId, { health: 'd6' });
            }
            setRecoveryRolling(null);
        }, 850);
    }

    function handleNewGame() {
        clearGameState();
        onNewGame();
    }

    const roundProgress = ((gameState.currentRound) / totalRounds) * 100;

    const downOps = gameState.operatives.filter(o => o.health === 'DOWN');

    return (
        <div className="flex flex-col h-full">
            {/* Turn Tracker Top Bar */}
            <div className="px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-2"
                style={{ background: 'var(--bg-dark)', borderBottom: '1px solid var(--border)' }}>
                <div className="flex items-center gap-4">
                    <h2 className="heading-font text-lg font-bold tracking-wider" style={{ color: 'var(--accent-amber)' }}>
                        ROUND {gameState.currentRound} / {totalRounds}
                    </h2>
                    {scenario && (
                        <span className="text-xs px-2 py-0.5 rounded" style={{ background: 'var(--bg-card)', color: 'var(--text-dim)' }}>
                            {scenario.name}
                        </span>
                    )}
                </div>
                <div className="flex items-center gap-2">
                    <button onClick={openEndPhase}
                        className="text-xs font-bold px-3 py-1.5 rounded transition-all hover:scale-105"
                        style={{ background: 'rgba(255,190,11,0.15)', color: 'var(--accent-amber)', border: '1px solid var(--accent-amber)44' }}>
                        End Phase
                    </button>
                    <button onClick={handleNewGame}
                        className="text-xs font-bold px-3 py-1.5 rounded transition-all hover:scale-105"
                        style={{ background: 'rgba(255,51,102,0.15)', color: 'var(--accent-red)', border: '1px solid var(--accent-red)44' }}>
                        New Game
                    </button>
                </div>
            </div>

            {/* Round Progress Bar */}
            <div className="w-full h-1" style={{ background: 'var(--bg-panel)' }}>
                <div className="h-full transition-all duration-500" style={{ width: `${roundProgress}%`, background: 'linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta))' }} />
            </div>

            {/* Main Content */}
            <div className="flex-1 flex flex-col lg:flex-row gap-0 overflow-hidden" style={{ minHeight: 0 }}>

                {/* Left Panel - Operative List */}
                <div className="lg:w-80 xl:w-96 overflow-y-auto p-4 space-y-2" style={{ background: 'var(--bg-dark)', borderRight: '1px solid var(--border)' }}>
                    <h3 className="heading-font text-sm font-bold tracking-wider mb-2" style={{ color: 'var(--accent-cyan)' }}>
                        AI OPERATIVES
                    </h3>
                    {gameState.operatives.map(op => {
                        const isOut = op.health === 'OUT';
                        const isDown = op.health === 'DOWN';
                        const isActivated = gameState.activatedThisRound.includes(op.id);
                        const isSelected = activeOpId === op.id;

                        return (
                            <div key={op.id}
                                className={`p-3 rounded-lg transition-all cursor-pointer ${isSelected ? 'glow-cyan' : ''}`}
                                onClick={() => !isOut && selectOperative(op.id)}
                                style={{
                                    background: isSelected ? 'rgba(0,212,255,0.08)' : 'var(--bg-panel)',
                                    border: `1px solid ${isSelected ? 'var(--accent-cyan)' : 'var(--border)'}`,
                                    opacity: isOut ? 0.4 : (isDown ? 0.6 : 1),
                                    textDecoration: isOut ? 'line-through' : 'none',
                                }}>
                                <div className="flex items-center justify-between gap-2 mb-1">
                                    <span className="text-sm font-bold truncate" style={{ color: isOut ? 'var(--text-dim)' : 'var(--text-bright)' }}>
                                        {op.name || TIER_MAP[op.tier]?.name || 'Unnamed'}
                                    </span>
                                    <HealthBadge health={op.health} onClick={(e) => { e.stopPropagation(); degradeHealth(op.id); }} />
                                </div>
                                <div className="flex items-center gap-2">
                                    <TierBadge tierId={op.tier} />
                                    <TagBadge tagId={op.behaviorTag} />
                                    {isActivated && !isOut && (
                                        <span className="text-xs px-1.5 py-0.5 rounded"
                                            style={{ background: 'rgba(0,245,160,0.15)', color: 'var(--accent-green)' }}>
                                            DONE
                                        </span>
                                    )}
                                    {isDown && (
                                        <button onClick={(e) => { e.stopPropagation(); performRecovery(op.id); }}
                                            disabled={recoveryRolling === op.id}
                                            className="text-xs px-2 py-0.5 rounded transition-all hover:scale-105"
                                            style={{ background: 'rgba(255,190,11,0.15)', color: 'var(--accent-amber)', border: '1px solid var(--accent-amber)44' }}>
                                            {recoveryRolling === op.id ? 'Rolling...' : 'Recovery'}

                                    )}
                                </div>
                                {recoveryResult && recoveryResult.opId === op.id && (
                                    <div className="mt-2 text-xs p-2 rounded fade-in-up"
                                        style={{
                                            background: recoveryResult.success ? 'rgba(0,245,160,0.1)' : 'rgba(255,51,102,0.1)',
                                            color: recoveryResult.success ? 'var(--accent-green)' : 'var(--accent-red)',
                                            border: `1px solid ${recoveryResult.success ? 'var(--accent-green)' : 'var(--accent-red)'}33`,
                                        }}>
                                        Rolled {recoveryResult.roll} - {recoveryResult.success ? 'RECOVERED! Back to d6.' : 'FAILED. Still DOWN.'}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>

                {/* Right Panel - Behavior Roller + Helpers */}
                <div className="flex-1 overflow-y-auto p-4 space-y-4">

                    {/* End Phase Overlay */}
                    {showEndPhase && (
                        <div className="rounded-lg p-6 fade-in-up" style={{ background: 'var(--bg-panel)', border: '1px solid var(--accent-amber)44' }}>
                            <h3 className="heading-font text-lg font-bold tracking-wider mb-4" style={{ color: 'var(--accent-amber)' }}>
                                END PHASE
                            </h3>
                            <div className="space-y-3">
                                {[
                                    { key: 'recovery', label: 'Recovery rolls for DOWN operatives' },
                                    { key: 'vp', label: 'Score VP for held objectives' },
                                    { key: 'conditions', label: 'Check scenario conditions' },
                                    { key: 'advance', label: 'Advance round' },
                                ].map(item => (
                                    <label key={item.key} className="flex items-center gap-3 cursor-pointer text-sm p-2 rounded transition-all hover:bg-white/5">
                                        <input type="checkbox" checked={endPhaseChecks[item.key]}

                                            className="w-4 h-4 accent-cyan-400" />
                                        <span style={{ color: endPhaseChecks[item.key] ? 'var(--accent-green)' : 'var(--text-primary)', textDecoration: endPhaseChecks[item.key] ? 'line-through' : 'none' }}>
                                            {item.label}
                                        </span>
                                    </label>
                                ))}

                                {downOps.length > 0 && (
                                    <div className="mt-3 p-3 rounded" style={{ background: 'var(--bg-card)', border: '1px solid var(--border)' }}>

                                            <div key={op.id} className="flex items-center justify-between py-1">

                                                    style={{ background: 'rgba(255,190,11,0.15)', color: 'var(--accent-amber)', border: '1px solid var(--accent-amber)44' }}>
                                                    {recoveryRolling === op.id ? 'Rolling...' : 'Roll Recovery'}

                                            </div>
                                        ))}
                                    </div>
                                )}

                                <button onClick={nextRound} disabled={gameState.currentRound >= totalRounds}
                                    className="heading-font w-full text-sm font-bold py-3 mt-4 rounded transition-all hover:scale-[1.01] disabled:opacity-30"
                                    style={{
                                        background: 'linear-gradient(135deg, var(--accent-amber), var(--accent-magenta))',
                                        color: '#fff',
                                        border: 'none',
                                    }}>
                                    {gameState.currentRound >= totalRounds ? 'GAME OVER' : `COMPLETE END PHASE — ADVANCE TO ROUND ${gameState.currentRound + 1}`}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Behavior Roller */}
                    {!showEndPhase && activeOp && (
                        <div className="rounded-lg p-6 fade-in-up" style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)' }}>
                            <div className="flex items-center gap-3 mb-4">
                                <h3 className="heading-font text-lg font-bold tracking-wider" style={{ color: 'var(--text-bright)' }}>
                                    {activeOp.name || TIER_MAP[activeOp.tier]?.name || 'Operative'}
                                </h3>
                                <TierBadge tierId={activeOp.tier} />
                                <TagBadge tagId={activeOp.behaviorTag} />
                            </div>

                            {activeBehavior && (
                                <p className="text-xs mb-4 italic" style={{ color: 'var(--text-dim)' }}>
                                    {activeBehavior.personality}
                                </p>
                            )}

                            <div className="flex flex-col items-center py-4">
                                <DiceRollerVisual
                                    rolling={rolling}
                                    result={rollResult}
                                    onRoll={performRoll}
                                    label="Behavior Roll"
                                />
                            </div>

                            {/* Roll Result Action */}
                            {rollResult !== null && !rolling && activeBehavior && (
                                <div className="mt-4 p-4 rounded-lg fade-in-up"
                                    style={{ background: 'rgba(0,245,160,0.08)', border: '1px solid var(--accent-green)33' }}>
                                    <div className="text-xs uppercase tracking-wider mb-1" style={{ color: 'var(--accent-green)' }}>
                                        Result: {rollResult}
                                    </div>
                                    <div className="text-sm font-bold" style={{ color: 'var(--text-bright)' }}>
                                        {getActionFromRoll(activeOp.behaviorTag, rollResult)?.action || ''}
                                    </div>
                                </div>
                            )}

                            {/* Full Behavior Table */}
                            {activeBehavior && (
                                <div className="mt-4">
                                    <div className="text-xs uppercase tracking-wider mb-2" style={{ color: 'var(--text-dim)' }}>
                                        {activeBehavior.name} Behavior Table
                                    </div>
                                    <div className="space-y-1">
                                        {activeBehavior.table.map((entry, i) => {
                                            const isHighlighted = rollResult !== null && !rolling && (
                                                (rollResult <= 2 && i === 0) ||
                                                (rollResult >= 3 && rollResult <= 4 && i === 1) ||
                                                (rollResult >= 5 && i === 2)
                                            );
                                            return (
                                                <div key={i} className="flex gap-3 p-2 rounded text-sm"
                                                    style={{
                                                        background: isHighlighted ? 'rgba(0,212,255,0.1)' : 'var(--bg-card)',
                                                        border: `1px solid ${isHighlighted ? 'var(--accent-cyan)' : 'var(--border)'}`,
                                                    }}>
                                                    <span className="font-bold shrink-0 w-8" style={{ color: isHighlighted ? 'var(--accent-cyan)' : 'var(--accent-amber)' }}>
                                                        {entry.roll}
                                                    </span>
                                                    <span style={{ color: isHighlighted ? 'var(--text-bright)' : 'var(--text-primary)' }}>
                                                        {entry.action}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* Done Button */}
                            {rollResult !== null && !rolling && (
                                <button onClick={markActivated}
                                    className="heading-font w-full text-sm font-bold py-3 mt-4 rounded transition-all hover:scale-[1.01]"
                                    style={{
                                        background: 'linear-gradient(135deg, var(--accent-green), var(--accent-cyan))',
                                        color: '#fff',
                                        border: 'none',
                                    }}>
                                    DONE — MARK ACTIVATED
                                </button>
                            )}
                        </div>
                    )}

                    {/* No Operative Selected */}
                    {!showEndPhase && !activeOp && (
                        <div className="rounded-lg p-8 text-center" style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)' }}>
                            <div className="text-4xl mb-3" style={{ color: 'var(--text-dim)', fontFamily: "'Orbitron', sans-serif" }}>&#x25C7;</div>
                            <p className="text-sm" style={{ color: 'var(--text-dim)' }}>
                                Select an AI operative from the left panel to roll their behavior.
                            </p>
                            {allActivated && (
                                <p className="text-sm mt-3" style={{ color: 'var(--accent-amber)' }}>
                                    All operatives activated this round. Open the End Phase.
                                </p>
                            )}
                        </div>
                    )}

                    {/* Target Priority Helper */}
                    <div className="rounded-lg overflow-hidden" style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)' }}>
                        <button onClick={() => setTargetPriorityOpen(prev => !prev)}
                            className="w-full flex items-center justify-between p-3 text-left transition-all hover:bg-white/5"
                            style={{ color: 'var(--text-primary)' }}>
                            <span className="heading-font text-sm font-bold tracking-wider" style={{ color: 'var(--accent-cyan)' }}>
                                TARGET PRIORITY
                            </span>
                            <span className="text-xs" style={{ color: 'var(--text-dim)' }}>
                                {targetPriorityOpen ? '[ - ]' : '[ + ]'}
                            </span>
                        </button>
                        {targetPriorityOpen && (
                            <div className="px-4 pb-4 space-y-2 fade-in-up">
                                {[
                                    'Nearest visible enemy',
                                    'If tied: lowest health enemy',
                                    'If tied: enemy holding an objective',
                                ].map((rule, i) => (
                                    <div key={i} className="flex items-start gap-3 text-sm">
                                        <span className="heading-font font-bold shrink-0 w-6 text-center" style={{ color: 'var(--accent-amber)' }}>
                                            {i + 1}.
                                        </span>
                                        <span style={{ color: 'var(--text-primary)' }}>{rule}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Health Tracker Legend */}
                    <div className="rounded-lg p-4" style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)' }}>
                        <h3 className="heading-font text-sm font-bold tracking-wider mb-3" style={{ color: 'var(--text-dim)' }}>
                            HEALTH TRACK
                        </h3>
                        <div className="flex flex-wrap gap-2">
                            {HEALTH_TRACK.map(h => (
                                <span key={h} className="text-xs font-bold px-2 py-1 rounded"
                                    style={{ background: `${HEALTH_COLORS[h]}22`, color: HEALTH_COLORS[h], border: `1px solid ${HEALTH_COLORS[h]}44` }}>
                                    {h}
                                </span>
                            ))}
                            <span className="text-xs self-center ml-2" style={{ color: 'var(--text-dim)' }}>
                                Click an operative's health badge to degrade
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}


// ============================================================
// APP
// ============================================================
function App() {
    const [view, setView] = useState('setup'); // 'setup' | 'play'
    const [gameState, setGameState] = useState(null);

    // Check for saved game on mount
    useEffect(() => {
        const saved = loadGameState();
        if (saved && saved.operatives && saved.operatives.length > 0) {
            setGameState(saved);
            setView('play');
        }
    }, []);

    function handleStartGame(operatives, scenarioId) {
        const scenario = GAME_DATA.scenarios.find(s => s.id === scenarioId);
        const state = {
            scenarioId,
            currentRound: 1,
            operatives: operatives.map(op => ({
                ...op,
                health: TIER_MAP[op.tier]?.health || 'd8',
            })),
            activatedThisRound: [],
        };
        setGameState(state);
        saveGameState(state);
        setView('play');
    }

    function handleNewGame() {
        setGameState(null);
        setView('setup');
    }

    const savedWarband = loadWarband();

    return (
        <div className="min-h-screen flex flex-col" style={{ background: 'var(--bg-black)' }}>
            <Header view={view} />
            {view === 'setup' && (
                <SetupView onStartGame={handleStartGame} initialWarband={savedWarband} />
            )}
            {view === 'play' && gameState && (
                <PlayView initialState={gameState} onNewGame={handleNewGame} />
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
